<!DOCTYPE html>
<html>
<head>
    <title>Workplace Well-being Survey</title>

    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea, #764ba2);
            margin: 0;
            padding: 20px;
        }

        .card {
            width: 450px;
            margin: auto;
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 15px 30px rgba(0,0,0,0.2);

            max-height: 90vh;
            overflow-y: auto;
        }

        h1 {
            text-align: center;
            color: #667eea;
            margin-bottom: 5px;
        }

        p {
            text-align: center;
            font-size: 13px;
            color: #666;
            margin-bottom: 20px;
        }

        label {
            font-weight: 600;
            margin-top: 12px;
            display: block;
        }

        input, select {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            border-radius: 8px;
            border: 1px solid #ccc;
            transition: 0.3s;
        }

        input:focus, select:focus {
            border-color: #667eea;
            box-shadow: 0 0 5px #667eea;
            outline: none;
        }

        button {
            width: 100%;
            margin-top: 20px;
            padding: 12px;
            border: none;
            border-radius: 8px;
            background: #667eea;
            color: white;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #5a67d8;
            transform: scale(1.02);
        }

        .note {
            text-align: center;
            font-size: 12px;
            margin-top: 10px;
            color: #777;
        }
    </style>
</head>

<body>

<div class="card">

    <h1>Workplace Well-being Survey</h1>
    <p>Your responses are anonymous and used only for insights</p>

    <form action="/submit" method="post">

        <label>Age</label>
        <input type="number" name="age" min="18" max="60" required>

        <label>Gender</label>
        <select name="gender">
            <option value="1">Male</option>
            <option value="0">Female</option>
        </select>

        <label>Family History of Mental Health Issues</label>
        <select name="family_history">
            <option value="1">Yes</option>
            <option value="0">No</option>
        </select>

        <label>Work Interference Level</label>
        <select name="work_interfere">
            <option value="0">Never</option>
            <option value="1">Rarely</option>
            <option value="2">Sometimes</option>
            <option value="3">Often</option>
        </select>

        <label>Remote Work</label>
        <select name="remote_work">
            <option value="1">Yes</option>
            <option value="0">No</option>
        </select>

        <label>Company Size</label>
        <select name="no_employees">
            <option value="0">1-5</option>
            <option value="1">6-25</option>
            <option value="2">26-100</option>
            <option value="3">100-500</option>
            <option value="4">500-1000</option>
            <option value="5">1000+</option>
        </select>

        <label>Mental Health Benefits</label>
        <select name="benefits">
            <option value="0">No</option>
            <option value="1">Yes</option>
            <option value="2">Not Sure</option>
        </select>

        <label>Working Hours per Week</label>
        <input type="number" name="working_hours" placeholder="e.g. 40">

        <label>Sleep Quality</label>
        <select name="sleep_quality">
            <option value="0">Poor</option>
            <option value="1">Average</option>
            <option value="2">Good</option>
        </select>

        <button type="submit">Submit Survey</button>

    </form>

    <div class="note">
        Designed for privacy-first mental health insights
    </div>

</div>

</body>
</html>
