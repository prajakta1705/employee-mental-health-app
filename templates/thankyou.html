<!DOCTYPE html>
<html>
<head>
    <title>Thank You</title>

    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea, #764ba2);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .card {
            background: white;
            padding: 30px;
            border-radius: 15px;
            text-align: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        h2 {
            color: #333;
        }

        p {
            color: #666;
        }

        a {
            display: inline-block;
            margin-top: 20px;
            padding: 10px 15px;
            background: #667eea;
            color: white;
            text-decoration: none;
            border-radius: 6px;
        }

        a:hover {
            background: #5a67d8;
        }
    </style>
</head>

<body>

<div class="card">
    <h2>Thank You! 🎉</h2>
    <p>Your response has been recorded anonymously.</p>

    <a href="/">Submit Another Response</a>
</div>

</body>
</html>
