<!DOCTYPE html>
<html>
<head>
    <title>HR Login</title>

    <style>
        body {
            font-family: Arial;
            background: #667eea;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .card {
            background: white;
            padding: 30px;
            border-radius: 10px;
            text-align: center;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }

        input {
            padding: 10px;
            margin: 10px;
            width: 200px;
        }

        button {
            padding: 10px 15px;
            background: #667eea;
            color: white;
            border: none;
            cursor: pointer;
        }

        button:hover {
            background: #5a67d8;
        }
    </style>
</head>

<body>

<div class="card">
    <h2>HR Access</h2>

    <form method="POST">
        <!-- 🔥 IMPORTANT CHANGE -->
        <input type="password" name="password" placeholder="Enter Password" required>
        <br>
        <button type="submit">Login</button>
    </form>
</div>

</body>
</html>
